name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Image
      run: docker build -t your-dockerhub/fastapi-app:${{ github.sha }} .

    - name: Push Image
      run: docker push your-dockerhub/fastapi-app:${{ github.sha }}

    - name: Update Manifest Repo
      run: |
        git clone https://github.com/your-username/k8s-manifests.git
        cd k8s-manifests

        sed -i "s|image:.*|image: your-dockerhub/fastapi-app:${{ github.sha }}|g" deployment.yaml

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git commit -am "Update image"
        git push
