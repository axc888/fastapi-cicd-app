name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: axc11/fastapi-app:${{ github.sha }}

    - name: Update Manifest Repo
      run: |
        git clone https://x-access-token:${{ secrets.MANIFEST_REPO_TOKEN }}@github.com/axc888/fastapi-k8s-manifests
        cd fastapi-k8s-manifests
        sed -i "s|image:.*|image: axc11/fastapi-app:${{ github.sha }}|g" deployment.yaml

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git commit -am "Update image to ${{ github.sha }}"
        git push
